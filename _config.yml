# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog.
#
# This file is *NOT* reloaded automatically when you use 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Personalize site settings
# In the HTML files they are accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: Eloi Torrents
email: eloi@eloitorrents.cat
description: >- # this means to ignore newlines until "baseurl:"
  Write an awesome description for your new site here. You can edit this
  line in _config.yml. It will appear in your document head meta (for
  Google search results) and in your feed.xml site description.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://eloitorrents.cat" # the base hostname & protocol for your site, e.g. http://example.com
github_username:  Eloitor

# Build settings
theme: minima
plugins:
  - jekyll-feed
  - jekyll-katex

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: "ca/"
    values:
      language: "ca"
  - scope:
      path: "en/"
    values:
      language: "en/"
      
katex:
#   js_path: "{{ Gem::lib_path }}/assets/js"  # Path used to search for katex.min.js
  rendering_options:
    # Default KaTeX rendering options. See https://github.com/Khan/KaTeX#rendering-options
    throw_error: true  
    error_color: "#cc0000" 
    
